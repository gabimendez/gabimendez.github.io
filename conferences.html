<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Conference Tracker</title>
</head>
<body>

  <h1>Conference Tracker</h1>
  <div id="conference-list"></div>

  <script>
    fetch('conferences.json')
      .then(response => response.json())
      .then(data => {
        const container = document.getElementById('conference-list');

        data.forEach(conf => {
          const div = document.createElement('div');
          div.innerHTML = `
            <h3>${conf.title}</h3>
            <p>${conf.location}</p>
            <p>${conf.date}</p>
            <hr>
          `;
          container.appendChild(div);
        });
      })
      .catch(error => console.error('Error loading JSON:', error));
  </script>
