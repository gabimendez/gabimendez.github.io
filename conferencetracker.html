<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Conference Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    select { margin-right: 10px; padding: 5px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { cursor: pointer; background-color: #f4f4f4; }
  </style>
</head>
<body>

<h2>Conference Tracker</h2>

<!-- Controls -->
<label>Sort by:</label>
<select id="sortSelect">
  <option value="date">Date</option>
  <option value="event">Event Name</option>
</select>

<label>Filter by month:</label>
<select id="monthFilter">
  <option value="all">All</option>
  <option value="0">January</option>
  <option value="1">February</option>
  <option value="2">March</option>
  <option value="3">April</option>
  <option value="4">May</option>
  <option value="5">June</option>
  <option value="6">July</option>
  <option value="7">August</option>
  <option value="8">September</option>
  <option value="9">October</option>
  <option value="10">November</option>
  <option value="11">December</option>
</select>

<table id="conferenceTable">
  <thead>
    <tr>
      <th>Event</th>
      <th>Topic</th>
      <th>Location</th>
      <th>Modality</th>
      <th>Dates</th>
      <th>CFP</th>
      <th>Fee</th>
      <th>Scholarships</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
// === DATA ===
const conferences = [
  {
    "event": "NAFSA 2027 Annual Conference & Expo",
    "topic": "International Education",
    "location": "Los Angeles, CA, USA",
    "modality": "In-person",
    "dates": "June 1-4, 2027",
    "cfp": "August 26, 2026",
    "fee": "$$$",
    "scholarships": "Yes",
    "link": "https://www.nafsa.org/2027/cfp"
  },
  {
    "event": "EAIE Conference 2026",
    "topic": "International Education",
    "location": "Glasgow, UK",
    "modality": "In-person",
    "dates": "Sept 8–11, 2026",
    "cfp": "Closed",
    "fee": "€719 - €1079",
    "scholarships": "Limited",
    "link": "https://www.eaie.org/events/glasgow.html"
  },
  {
    "event": "IVEC Conference",
    "topic": "Virtual Exchange",
    "location": "Varies",
    "modality": "Hybrid",
    "dates": "October 26-29, 2026",
    "cfp": "Closed",
    "fee": "$50 - $285",
    "scholarships": "Yes",
    "link": "https://iveconference.org/"
  },
  {
    "event": "FAUBAI Conference 2026",
    "topic": "International Education",
    "location": "Florianópolis, Brazil",
    "modality": "In-person",
    "dates": "April 12 – 15, 2026",
    "cfp": "August 4 – October 31",
    "fee": "$399 - $599",
    "scholarships": "Limited",
    "link": "https://faubai.org.br/conf/2026/"
  },
  {
    "event": "AAC&U Global Learning Conference",
    "topic": "Global Learning",
    "location": "USA",
    "modality": "Hybrid",
    "dates": "November 12-14,2026",
    "cfp": "Closed",
    "fee": "$175 - $800",
    "scholarships": "Yes",
    "link": "https://www.aacu.org/event/2026-conference-on-global-learning"
  },
  {
    "event": "ANGEL Conference",
    "topic": "Global Learning/Intercultural Education",
    "location": "Bologna, Italy",
    "modality": "In-Person",
    "dates": "September 10-11, 2026",
    "cfp": "Closed",
    "fee": "£180 - £300",
    "scholarships": "No",
    "link": "https://angel-network.net/ANGELConference2026_Call"
  }
];

// === HELPERS ===
function parseMonth(dateString) {
  const months = ["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
  const lower = dateString.toLowerCase();
  for (let i = 0; i < months.length; i++) {
    if (lower.includes(months[i])) return i;
  }
  return -1;
}

function parseDate(dateString) {
  return new Date(dateString.replace(/–/g, "-"));
}

// === RENDER ===
function renderTable(data) {
  const tbody = document.querySelector("#conferenceTable tbody");
  tbody.innerHTML = "";

  data.forEach(conf => {
    const row = `
      <tr>
        <td><a href="${conf.link}" target="_blank">${conf.event}</a></td>
        <td>${conf.topic}</td>
        <td>${conf.location}</td>
        <td>${conf.modality}</td>
        <td>${conf.dates}</td>
        <td>${conf.cfp}</td>
        <td>${conf.fee}</td>
        <td>${conf.scholarships}</td>
      </tr>
    `;
    tbody.innerHTML += row;
  });
}

// === FILTER + SORT ===
function updateView() {
  let data = [...conferences];

  const selectedMonth = document.getElementById("monthFilter").value;
  const sortBy = document.getElementById("sortSelect").value;

  // Filter
  if (selectedMonth !== "all") {
    data = data.filter(conf => parseMonth(conf.dates) == selectedMonth);
  }

  // Sort
  if (sortBy === "event") {
    data.sort((a, b) => a.event.localeCompare(b.event));
  } else {
    data.sort((a, b) => parseDate(a.dates) - parseDate(b.dates));
  }

  renderTable(data);
}

// === EVENTS ===
document.getElementById("sortSelect").addEventListener("change", updateView);
document.getElementById("monthFilter").addEventListener("change", updateView);

// Initial render
updateView();

</script>

</body>
</html>
